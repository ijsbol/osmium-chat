name: Publish osmium-chat to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions (Poetry)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Check pyproject + lockfile
        run: |
          poetry check --lock

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(poetry version -s)"
          echo "Release tag: ${tag}"
          echo "Package version: ${pkg}"
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::Release tag '${tag}' does not match pyproject.toml version '${pkg}'"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          poetry build
          ls -la dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing / OIDC)
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/osmium-chat

    permissions:
      contents: read
      id-token: write # required for PyPI trusted publishing (OIDC)

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
